name: Astro City Metrobook v01
year: 2022
description: |
  Collects the foundational stories of the Astro City universe, beginning with Samaritan's day-to-day heroics and expanding to explore the city through the eyes of ordinary citizens, an alien spy infiltrating humanity, a young man apprenticed to the mysterious Confessor, and the emotionally devastating tale of a man haunted by memories of a woman erased from existence. These anthology-style stories offer a ground-level perspective on life in a world of superheroes, examining themes of identity, sacrifice, and the human cost of extraordinary power.
