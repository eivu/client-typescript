  - ai:rating_reasoning: "One of the most acclaimed superhero comics of the 1990s. Won multiple Eisner Awards including Best New Series (1996), Best Continuing Series (1997, 1998), Best Single Issue three consecutive years, and Best Serialized Story (1998). Also won Harvey Awards for Best New Series (1996) and Best Continuing/Limited Series (1998). Goodreads rating of 4.49/5 across 453 ratings. Comics Beat described the material as 'among the best work done with superheroes — in any medium — during the 1990s.' The collected issues include several individually award-winning stories including 'Safeguards,' 'Welcome to Astro City,' 'Show Em All,' and the 'Confession' arc."
