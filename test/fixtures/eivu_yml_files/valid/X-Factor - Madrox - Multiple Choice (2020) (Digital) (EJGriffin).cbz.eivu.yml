name: Madrox - Multiple Choice
year: 2005
description: |
  Jamie Madrox sets up a private detective agency in Mutant Town with former X-Factor teammates Wolfsbane and Strong Guy. When one of his duplicates staggers home with a fatal stab wound, Madrox absorbs the dying dupe and heads to Chicago to investigate his own murder. A noir-influenced mystery unfolds as Madrox discovers a conspiracy involving a crime boss, a femme fatale, and a shape-shifting assassin named Clay, while Rahne takes on a case involving a mutant wife whose husband may be unfaithful.
