  - ai:rating: 4.5
  - ai:rating_reasoning: "Alan Moore's Saga of the Swamp Thing Book Two is widely regarded as a masterpiece of horror comics. Issues in this collection won the 1985 Jack Kirby Awards for Best Single Issue (Annual #2), Best Continuing Series, Best Writer, Best Art Team, and Best Cover (#34). Rolling Stone called Moore's Swamp Thing run 'perhaps the brainiest and scariest horror narrative of the 80s.' Goodreads readers rate the volume highly. The run is universally recognized as a foundational work that helped establish the mature readers movement in comics and directly led to the creation of DC's Vertigo imprint. Neil Gaiman has called it 'The best muck-encrusted monster in the best comics.'"
