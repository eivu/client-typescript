name: Saga of the Swamp Thing v02 - Love and Death
year: 2012
description: |
  Swamp Thing buries the remains of Alec Holland, confronts the return of Anton Arcane who has possessed Matt Cable's body, descends into Hell with the aid of Deadman, the Phantom Stranger, and Etrigan the Demon to rescue Abigail Arcane's soul, encounters a group of benevolent alien invaders, and consummates his relationship with Abby in the landmark issue Rite of Spring. Includes a reprinting of the original Swamp Thing story from House of Secrets with a new framing sequence.
